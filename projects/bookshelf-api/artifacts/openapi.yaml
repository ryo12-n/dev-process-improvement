openapi: "3.0.3"
info:
  title: "BookShelf API"
  version: "0.1.0"
  description: "REST API で書籍管理システムを構築する。個人や小規模チームが蔵書を登録・検索・貸出管理できる Web API を提供する。"

servers:
  - url: http://localhost:3000
    description: ローカル開発環境

paths:
  # ===== Books (FR-001) =====
  /books:
    get:
      summary: "書籍一覧を取得する"
      operationId: listBooks
      tags:
        - Books
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: "ページ番号"
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
          description: "1ページあたりの件数"
      responses:
        "200":
          description: "書籍一覧"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/Book"
        "401":
          description: "認証エラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "サーバーエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
        - bearerAuth: []
      x-fr-id: "FR-001"
    post:
      summary: "書籍を登録する"
      operationId: createBook
      tags:
        - Books
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookRequest"
      responses:
        "201":
          description: "書籍登録成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "400":
          description: "リクエストエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "認証エラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "サーバーエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
        - bearerAuth: []
      x-fr-id: "FR-001"

  /books/{bookId}:
    get:
      summary: "書籍の詳細を取得する"
      operationId: getBook
      tags:
        - Books
      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "書籍ID"
      responses:
        "200":
          description: "書籍詳細"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "401":
          description: "認証エラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "書籍が見つからない"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "サーバーエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
        - bearerAuth: []
      x-fr-id: "FR-001"
    put:
      summary: "書籍情報を更新する"
      operationId: updateBook
      tags:
        - Books
      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "書籍ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBookRequest"
      responses:
        "200":
          description: "書籍更新成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "400":
          description: "リクエストエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "認証エラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "書籍が見つからない"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "サーバーエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
        - bearerAuth: []
      x-fr-id: "FR-001"
    delete:
      summary: "書籍を削除する"
      operationId: deleteBook
      tags:
        - Books
      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "書籍ID"
      responses:
        "200":
          description: "書籍削除成功"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "401":
          description: "認証エラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "書籍が見つからない"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "サーバーエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
        - bearerAuth: []
      x-fr-id: "FR-001"

  # ===== Book Tags (FR-002) =====
  /books/{bookId}/tags:
    get:
      summary: "書籍のタグ一覧を取得する"
      operationId: listBookTags
      tags:
        - Tags
      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "書籍ID"
      responses:
        "200":
          description: "タグ一覧"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tag"
        "401":
          description: "認証エラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "書籍が見つからない"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "サーバーエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
        - bearerAuth: []
      x-fr-id: "FR-002"
    put:
      summary: "書籍のタグを設定する（全置換）"
      operationId: setBookTags
      tags:
        - Tags
      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "書籍ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tag_ids
              properties:
                tag_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        "200":
          description: "タグ設定成功"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tag"
        "400":
          description: "リクエストエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "認証エラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "書籍が見つからない"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "サーバーエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
        - bearerAuth: []
      x-fr-id: "FR-002"

  /tags:
    get:
      summary: "タグ一覧を取得する"
      operationId: listTags
      tags:
        - Tags
      responses:
        "200":
          description: "タグ一覧"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tag"
        "401":
          description: "認証エラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "サーバーエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
        - bearerAuth: []
      x-fr-id: "FR-002"
    post:
      summary: "タグを作成する"
      operationId: createTag
      tags:
        - Tags
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTagRequest"
      responses:
        "201":
          description: "タグ作成成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "400":
          description: "リクエストエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "認証エラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "サーバーエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
        - bearerAuth: []
      x-fr-id: "FR-002"

  /tags/{tagId}:
    put:
      summary: "タグを更新する"
      operationId: updateTag
      tags:
        - Tags
      parameters:
        - name: tagId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "タグID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTagRequest"
      responses:
        "200":
          description: "タグ更新成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "400":
          description: "リクエストエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "認証エラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "タグが見つからない"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "サーバーエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
        - bearerAuth: []
      x-fr-id: "FR-002"
    delete:
      summary: "タグを削除する"
      operationId: deleteTag
      tags:
        - Tags
      parameters:
        - name: tagId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "タグID"
      responses:
        "200":
          description: "タグ削除成功"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "401":
          description: "認証エラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "タグが見つからない"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "サーバーエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
        - bearerAuth: []
      x-fr-id: "FR-002"

  /categories:
    get:
      summary: "カテゴリ一覧を取得する"
      operationId: listCategories
      tags:
        - Categories
      responses:
        "200":
          description: "カテゴリ一覧"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
        "401":
          description: "認証エラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "サーバーエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
        - bearerAuth: []
      x-fr-id: "FR-002"
    post:
      summary: "カテゴリを作成する"
      operationId: createCategory
      tags:
        - Categories
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "201":
          description: "カテゴリ作成成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          description: "リクエストエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "認証エラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "サーバーエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
        - bearerAuth: []
      x-fr-id: "FR-002"

  /categories/{categoryId}:
    put:
      summary: "カテゴリを更新する"
      operationId: updateCategory
      tags:
        - Categories
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "カテゴリID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "200":
          description: "カテゴリ更新成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          description: "リクエストエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "認証エラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "カテゴリが見つからない"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "サーバーエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
        - bearerAuth: []
      x-fr-id: "FR-002"
    delete:
      summary: "カテゴリを削除する"
      operationId: deleteCategory
      tags:
        - Categories
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "カテゴリID"
      responses:
        "200":
          description: "カテゴリ削除成功"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "401":
          description: "認証エラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "カテゴリが見つからない"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "サーバーエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
        - bearerAuth: []
      x-fr-id: "FR-002"

  # ===== Search (FR-003) =====
  /books/search:
    get:
      summary: "書籍を検索する"
      operationId: searchBooks
      tags:
        - Books
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: "検索キーワード（タイトル・著者・ISBN・タグで部分一致）"
        - name: title
          in: query
          schema:
            type: string
          description: "タイトル（部分一致）"
        - name: author
          in: query
          schema:
            type: string
          description: "著者（部分一致）"
        - name: isbn
          in: query
          schema:
            type: string
          description: "ISBN（部分一致）"
        - name: tag
          in: query
          schema:
            type: string
          description: "タグ名（部分一致）"
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: "ページ番号"
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
          description: "1ページあたりの件数"
      responses:
        "200":
          description: "検索結果"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/Book"
        "400":
          description: "リクエストエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "認証エラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "サーバーエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
        - bearerAuth: []
      x-fr-id: "FR-003"

  # ===== Loan Requests (FR-004) =====
  /loan-requests:
    get:
      summary: "貸出リクエスト一覧を取得する"
      operationId: listLoanRequests
      tags:
        - Loans
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
          description: "ステータスでフィルタ"
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: "ページ番号"
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
          description: "1ページあたりの件数"
      responses:
        "200":
          description: "貸出リクエスト一覧"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/LoanRequest"
        "401":
          description: "認証エラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "サーバーエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
        - bearerAuth: []
      x-fr-id: "FR-004"
    post:
      summary: "貸出リクエストを送信する"
      operationId: createLoanRequest
      tags:
        - Loans
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLoanRequestBody"
      responses:
        "201":
          description: "貸出リクエスト作成成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoanRequest"
        "400":
          description: "リクエストエラー（既に貸出中等）"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "認証エラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "書籍が見つからない"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "サーバーエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
        - bearerAuth: []
      x-fr-id: "FR-004"

  /loan-requests/{requestId}/approve:
    post:
      summary: "貸出リクエストを承認する"
      operationId: approveLoanRequest
      tags:
        - Loans
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "貸出リクエストID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                due_date:
                  type: string
                  format: date
                  description: "返却期限（省略時はデフォルト14日後）"
      responses:
        "200":
          description: "承認成功・貸出レコード作成"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loan"
        "400":
          description: "リクエストエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "認証エラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "リクエストが見つからない"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "サーバーエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
        - bearerAuth: []
      x-fr-id: "FR-004"

  /loan-requests/{requestId}/reject:
    post:
      summary: "貸出リクエストを却下する"
      operationId: rejectLoanRequest
      tags:
        - Loans
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "貸出リクエストID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: "却下理由"
      responses:
        "200":
          description: "却下成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoanRequest"
        "400":
          description: "リクエストエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "認証エラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "リクエストが見つからない"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "サーバーエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
        - bearerAuth: []
      x-fr-id: "FR-004"

  # ===== Loans / Returns (FR-005) =====
  /loans:
    get:
      summary: "貸出一覧を取得する（自分の貸出中書籍）"
      operationId: listLoans
      tags:
        - Loans
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, returned]
          description: "ステータスでフィルタ"
        - name: user_id
          in: query
          schema:
            type: string
            format: uuid
          description: "利用者IDでフィルタ（管理者のみ）"
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: "ページ番号"
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
          description: "1ページあたりの件数"
      responses:
        "200":
          description: "貸出一覧"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/Loan"
        "401":
          description: "認証エラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "サーバーエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
        - bearerAuth: []
      x-fr-id: "FR-005"

  /loans/{loanId}/return:
    post:
      summary: "書籍を返却する"
      operationId: returnBook
      tags:
        - Loans
      parameters:
        - name: loanId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "貸出ID"
      responses:
        "200":
          description: "返却成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loan"
        "400":
          description: "リクエストエラー（既に返却済み等）"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "認証エラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "貸出が見つからない"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "サーバーエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
        - bearerAuth: []
      x-fr-id: "FR-005"

  /loans/history:
    get:
      summary: "貸出履歴を取得する"
      operationId: getLoanHistory
      tags:
        - Loans
      parameters:
        - name: user_id
          in: query
          schema:
            type: string
            format: uuid
          description: "利用者IDでフィルタ"
        - name: book_id
          in: query
          schema:
            type: string
            format: uuid
          description: "書籍IDでフィルタ"
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: "ページ番号"
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
          description: "1ページあたりの件数"
      responses:
        "200":
          description: "貸出履歴"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/Loan"
        "401":
          description: "認証エラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "サーバーエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
        - bearerAuth: []
      x-fr-id: "FR-005"

  # ===== Overdue Alerts (FR-006) =====
  /loans/overdue:
    get:
      summary: "延滞中の貸出一覧を取得する"
      operationId: listOverdueLoans
      tags:
        - Loans
      parameters:
        - name: user_id
          in: query
          schema:
            type: string
            format: uuid
          description: "利用者IDでフィルタ"
        - name: book_id
          in: query
          schema:
            type: string
            format: uuid
          description: "書籍IDでフィルタ"
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: "ページ番号"
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
          description: "1ページあたりの件数"
      responses:
        "200":
          description: "延滞一覧"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/OverdueLoan"
        "401":
          description: "認証エラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "サーバーエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
        - bearerAuth: []
      x-fr-id: "FR-006"

  # ===== Users / Auth (FR-007) =====
  /auth/register:
    post:
      summary: "ユーザー登録"
      operationId: registerUser
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: "ユーザー登録成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: "リクエストエラー（メールアドレス重複等）"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "サーバーエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-fr-id: "FR-007"

  /auth/login:
    post:
      summary: "ログイン（JWT トークン発行）"
      operationId: loginUser
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: "ログイン成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthToken"
        "401":
          description: "認証失敗"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "サーバーエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-fr-id: "FR-007"

  /auth/logout:
    post:
      summary: "ログアウト"
      operationId: logoutUser
      tags:
        - Auth
      responses:
        "200":
          description: "ログアウト成功"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "401":
          description: "認証エラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "サーバーエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
        - bearerAuth: []
      x-fr-id: "FR-007"

  /users/me:
    get:
      summary: "自分のユーザー情報を取得する"
      operationId: getMe
      tags:
        - Users
      responses:
        "200":
          description: "ユーザー情報"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: "認証エラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "サーバーエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
        - bearerAuth: []
      x-fr-id: "FR-007"

components:
  schemas:
    # ===== Book =====
    Book:
      type: object
      required:
        - id
        - title
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: "書籍ID"
        isbn:
          type: string
          description: "ISBN"
        title:
          type: string
          description: "書籍タイトル"
        author:
          type: string
          description: "著者"
        publisher:
          type: string
          description: "出版社"
        published_date:
          type: string
          format: date
          description: "出版日"
        description:
          type: string
          description: "書籍の説明"
        category_id:
          type: string
          format: uuid
          description: "カテゴリID"
        tags:
          type: array
          items:
            $ref: "#/components/schemas/Tag"
          description: "付与されたタグ一覧"
        is_available:
          type: boolean
          description: "貸出可能かどうか"
        created_at:
          type: string
          format: date-time
          description: "作成日時"
        updated_at:
          type: string
          format: date-time
          description: "更新日時"

    CreateBookRequest:
      type: object
      required:
        - title
      properties:
        isbn:
          type: string
          description: "ISBN（指定時は書誌情報を自動取得）"
        title:
          type: string
          description: "書籍タイトル（ISBN 自動取得時は上書き可）"
        author:
          type: string
          description: "著者"
        publisher:
          type: string
          description: "出版社"
        published_date:
          type: string
          format: date
          description: "出版日"
        description:
          type: string
          description: "書籍の説明"
        category_id:
          type: string
          format: uuid
          description: "カテゴリID"

    UpdateBookRequest:
      type: object
      properties:
        title:
          type: string
          description: "書籍タイトル"
        author:
          type: string
          description: "著者"
        publisher:
          type: string
          description: "出版社"
        published_date:
          type: string
          format: date
          description: "出版日"
        description:
          type: string
          description: "書籍の説明"
        category_id:
          type: string
          format: uuid
          description: "カテゴリID"

    # ===== Tag =====
    Tag:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
          description: "タグID"
        name:
          type: string
          description: "タグ名"
        created_at:
          type: string
          format: date-time
          description: "作成日時"

    CreateTagRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: "タグ名"

    # ===== Category =====
    Category:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
          description: "カテゴリID"
        name:
          type: string
          description: "カテゴリ名"
        description:
          type: string
          description: "カテゴリの説明"
        created_at:
          type: string
          format: date-time
          description: "作成日時"

    CreateCategoryRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: "カテゴリ名"
        description:
          type: string
          description: "カテゴリの説明"

    # ===== Loan Request =====
    LoanRequest:
      type: object
      required:
        - id
        - book_id
        - user_id
        - status
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: "貸出リクエストID"
        book_id:
          type: string
          format: uuid
          description: "書籍ID"
        user_id:
          type: string
          format: uuid
          description: "リクエスト者のユーザーID"
        status:
          type: string
          enum: [pending, approved, rejected]
          description: "ステータス"
        reason:
          type: string
          description: "却下理由（rejected の場合）"
        created_at:
          type: string
          format: date-time
          description: "作成日時"
        updated_at:
          type: string
          format: date-time
          description: "更新日時"

    CreateLoanRequestBody:
      type: object
      required:
        - book_id
      properties:
        book_id:
          type: string
          format: uuid
          description: "貸出を希望する書籍ID"

    # ===== Loan =====
    Loan:
      type: object
      required:
        - id
        - book_id
        - user_id
        - status
        - loan_date
        - due_date
      properties:
        id:
          type: string
          format: uuid
          description: "貸出ID"
        book_id:
          type: string
          format: uuid
          description: "書籍ID"
        user_id:
          type: string
          format: uuid
          description: "利用者のユーザーID"
        status:
          type: string
          enum: [active, returned]
          description: "貸出ステータス"
        loan_date:
          type: string
          format: date
          description: "貸出日"
        due_date:
          type: string
          format: date
          description: "返却期限"
        return_date:
          type: string
          format: date
          description: "実際の返却日"
        created_at:
          type: string
          format: date-time
          description: "作成日時"

    OverdueLoan:
      type: object
      required:
        - id
        - book_id
        - user_id
        - due_date
        - overdue_days
      properties:
        id:
          type: string
          format: uuid
          description: "貸出ID"
        book_id:
          type: string
          format: uuid
          description: "書籍ID"
        user_id:
          type: string
          format: uuid
          description: "利用者のユーザーID"
        loan_date:
          type: string
          format: date
          description: "貸出日"
        due_date:
          type: string
          format: date
          description: "返却期限"
        overdue_days:
          type: integer
          description: "延滞日数"

    # ===== User / Auth =====
    User:
      type: object
      required:
        - id
        - email
        - name
        - role
      properties:
        id:
          type: string
          format: uuid
          description: "ユーザーID"
        email:
          type: string
          format: email
          description: "メールアドレス"
        name:
          type: string
          description: "ユーザー名"
        role:
          type: string
          enum: [admin, user]
          description: "ロール（admin: 管理者、user: 一般利用者）"
        created_at:
          type: string
          format: date-time
          description: "作成日時"

    RegisterRequest:
      type: object
      required:
        - email
        - password
        - name
      properties:
        email:
          type: string
          format: email
          description: "メールアドレス"
        password:
          type: string
          format: password
          minLength: 8
          description: "パスワード（8文字以上）"
        name:
          type: string
          description: "ユーザー名"

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: "メールアドレス"
        password:
          type: string
          format: password
          description: "パスワード"

    AuthToken:
      type: object
      required:
        - access_token
        - token_type
        - expires_in
      properties:
        access_token:
          type: string
          description: "JWT アクセストークン"
        token_type:
          type: string
          description: "トークン種別"
          example: "Bearer"
        expires_in:
          type: integer
          description: "有効期限（秒）"

    # ===== Common =====
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          description: "HTTPステータスコード"
        message:
          type: string
          description: "エラーメッセージ"
        details:
          type: array
          items:
            type: string
          description: "エラー詳細"

    PaginatedResponse:
      type: object
      required:
        - items
        - total
        - page
        - per_page
      properties:
        items:
          type: array
          items: {}
          description: "結果アイテム一覧"
        total:
          type: integer
          description: "全件数"
        page:
          type: integer
          description: "現在のページ番号"
        per_page:
          type: integer
          description: "1ページあたりの件数"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
