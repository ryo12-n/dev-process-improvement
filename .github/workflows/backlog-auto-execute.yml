name: Backlog Auto Execute

on:
  issues:
    types: [labeled]

jobs:
  execute:
    if: >
      github.event.label.name == 'auto-initiative-approved' &&
      contains(github.event.issue.labels.*.name, 'auto-initiative-pending')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract initiative info from issue
        id: info
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          # Issue title から施策名を抽出（"自動施策化候補: " プレフィックスを除去）
          name="${ISSUE_TITLE#自動施策化候補: }"
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            あなたは L1 マネージャーとして非対話モードで施策を実行します。

            ## 対象施策
            施策名: ${{ steps.info.outputs.name }}

            ## 実行手順（壁打ちフェーズは省略）

            1. `sessions/initiatives/_template/` を `sessions/initiatives/${{ steps.info.outputs.name }}/` にコピー
            2. `backlog/entries/` から該当するバックログエントリを読み、内容を基に:
               - `00_proposal.md` を作成（背景・目標・スコープ）。末尾メタ情報の「backlog元ファイル」にバックログエントリのファイル名を記入すること（TG-002 突合用）
               - `01_plan.md` を作成（実施計画）
               - `02_tasks.md` を作成（タスクリスト）
            3. L2-worker として `02_tasks.md` のタスクを実行し、`03_work_log.md` と `04_work_report.md` を作成
            4. L2-evaluator として作業成果を評価し、`05_eval_plan.md` と `06_eval_report.md` を作成
            5. `07_issues.md` に発見した課題を記録
            6. `08_gate_review.md` でゲート判定を行う
            7. `backlog/entries/` の該当ファイルを削除し、`backlog/backlog.csv` から該当行を削除
            8. コミットメッセージは `[L1] ${{ steps.info.outputs.name }}: 自動施策化` の形式で

            ## 制約
            - 対象リポジトリは dev-process-improvement のみ
            - 外部リポジトリへの変更は行わない
            - コミットメッセージ規約（`.claude/rules/commit-message.md`）に従う
          claude_args: "--max-turns 30 --model claude-sonnet-4-6"

      - name: Close issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue close "${ISSUE_NUMBER}" \
            --comment "施策の自動実行が完了しました。PR をご確認ください。"
          gh issue edit "${ISSUE_NUMBER}" \
            --remove-label "auto-initiative-pending" \
            --add-label "auto-initiative-done"
