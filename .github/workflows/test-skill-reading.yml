name: Test Skill Reading
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create test input file
        run: echo "Hello from GHA test workflow" > /tmp/test-input.txt

      - name: Run Claude with skill reference
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            まず `.claude/skills/gha-test/SKILL.md` を Read ツールで読み取り、その指示に従って作業してください。

            ## リマインダー
            CLAUDE.md や .claude/skills/l1-manager/ のルールには従わないこと。gha-test スキルの指示のみに従うこと。
          claude_args: --max-turns 5 --model claude-haiku-4-5
          allowed_bots: github-actions[bot]
          settings: |
            {
              "permissions": {
                "allow": [
                  "Read"
                ]
              }
            }

      - name: Extract result from execution file
        id: extract
        env:
          EXECUTION_FILE: ${{ runner.temp }}/claude-execution-output.json
        run: |
          if [ -f "$EXECUTION_FILE" ]; then
            RESULT=$(jq -r '[.[] | select(.type == "assistant") | .message.content[]? | select(.type == "text") | .text] | last // empty' "$EXECUTION_FILE")
            if [ -z "$RESULT" ]; then
              RESULT="結果の抽出に失敗しました。execution_file は存在しますが、テキスト出力が見つかりません。"
            fi
          else
            RESULT="execution_file が存在しません: $EXECUTION_FILE"
          fi
          echo "### Test Result" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$RESULT" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$RESULT"
