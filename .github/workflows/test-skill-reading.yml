name: Test Skill Wallbash-Equivalent

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git for test commits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create test input file
        run: echo "Hello from GHA wallbash-equivalent test" > /tmp/test-input.txt

      - name: Run Claude with skill reference
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            まず `.claude/skills/gha-test/SKILL.md` を Read ツールで読み取り、その指示に従って作業してください。

            ## リマインダー
            CLAUDE.md や .claude/skills/l1-manager/ のルールには従わないこと。gha-test スキルの指示のみに従うこと。
          claude_args: --max-turns 20 --model claude-sonnet-4-6
          allowed_bots: github-actions[bot]
          show_full_output: true
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash(git *)",
                  "Bash(cp *)",
                  "Bash(cp -r *)",
                  "Bash(mkdir *)",
                  "Bash(rm *)",
                  "Bash(ls *)",
                  "Read",
                  "Write",
                  "Edit",
                  "Glob",
                  "Grep"
                ]
              }
            }

      - name: Cleanup remote branch on failure
        if: always()
        run: |
          # テストブランチが残っていたら削除（Claude のクリーンアップが失敗した場合の安全策）
          git push origin --delete test/gha-wallbash-verification 2>/dev/null || true

      - name: Extract result from execution file
        id: extract
        env:
          EXECUTION_FILE: ${{ runner.temp }}/claude-execution-output.json
        run: |
          if [ -f "$EXECUTION_FILE" ]; then
            RESULT=$(jq -r '[.[] | select(.type == "assistant") | .message.content[]? | select(.type == "text") | .text] | last // empty' "$EXECUTION_FILE")
            if [ -z "$RESULT" ]; then
              RESULT="結果の抽出に失敗しました。execution_file は存在しますが、テキスト出力が見つかりません。"
            fi
          else
            RESULT="execution_file が存在しません: $EXECUTION_FILE"
          fi
          echo "### Test Result" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$RESULT" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$RESULT"
