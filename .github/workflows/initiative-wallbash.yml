name: Initiative Wallbash

on:
  workflow_dispatch:
    description: 'Run wallbash phase for an initiative issue'
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: true
        type: number
      mode:
        description: 'Wallbash mode: init (first run) or continue (iterate with feedback)'
        required: false
        type: string
        default: 'init'
      feedback:
        description: 'Feedback content for continue mode'
        required: false
        type: string
        default: ''
      initiative_dir:
        description: 'Initiative directory path (for continue mode, e.g. sessions/initiatives/my-initiative/)'
        required: false
        type: string
        default: ''
      branch:
        description: 'Initiative branch name (for continue mode, e.g. initiative/my-initiative)'
        required: false
        type: string
        default: ''

jobs:
  wallbash:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout existing branch (continue mode)
        if: inputs.mode == 'continue'
        env:
          BRANCH: ${{ inputs.branch }}
        run: |
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"

      - name: Extract initiative info from issue
        id: info
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          # Issue タイトルと本文を取得
          issue_json=$(gh issue view "$ISSUE_NUMBER" --json title,body)
          title=$(echo "$issue_json" | jq -r '.title')
          body=$(echo "$issue_json" | jq -r '.body')
          echo "title=$title" >> "$GITHUB_OUTPUT"

          # Issue 本文を一時ファイルに保存（Claude のプロンプトで参照）
          echo "$body" > /tmp/issue_body.txt

      - name: Save feedback to file
        env:
          FEEDBACK: ${{ inputs.feedback }}
        run: |
          echo "$FEEDBACK" > /tmp/feedback.txt

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          WALLBASH_MODE: ${{ inputs.mode }}
          INITIATIVE_DIR: ${{ inputs.initiative_dir }}
        with:
          allowed_bots: "github-actions[bot]"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            `.claude/skills/gha-wallbash/SKILL.md` を Read ツールで読み取り、その指示に従って作業してください。
            このタスクは GitHub Actions の自動化ワークフローから実行されています。

            ## 動的コンテキスト
            Issue #${{ inputs.issue_number }}: ${{ steps.info.outputs.title }}
            モード: ${{ inputs.mode }}
            施策ディレクトリ: ${{ inputs.initiative_dir }}
            ブランチ: ${{ inputs.branch }}

            Issue 本文は `/tmp/issue_body.txt` に保存されています。
            フィードバック（init/continue 共通）は `/tmp/feedback.txt` に保存されています。init モードでもフィードバックがある場合は施策のコンテキスト補足として活用してください。
          claude_args: "--max-turns 30 --model claude-sonnet-4-6"
          show_full_output: true
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash(git *)",
                  "Bash(ls *)",
                  "Read",
                  "Write",
                  "Edit",
                  "Glob",
                  "Grep"
                ]
              }
            }

      - name: Extract initiative name
        id: extract
        env:
          EXECUTION_FILE: ${{ runner.temp }}/claude-execution-output.json
          MODE: ${{ inputs.mode }}
          INITIATIVE_DIR: ${{ inputs.initiative_dir }}
        run: |
          if [ "$MODE" = "continue" ]; then
            # continue モードではメタデータから施策名を取得
            initiative_name=$(echo "$INITIATIVE_DIR" | sed 's|^sessions/initiatives/||;s|/$||')
          else
            # init モードではブランチ名から施策名を取得
            branch=$(git branch --show-current)
            if [ "$branch" != "main" ]; then
              initiative_name=$(echo "$branch" | sed 's|^initiative/||')
            else
              echo "::error::Claude did not create an initiative branch"
              exit 1
            fi
          fi
          echo "initiative_name=$initiative_name" >> "$GITHUB_OUTPUT"

          # execution_file からサマリーを抽出
          if [ -f "$EXECUTION_FILE" ]; then
            summary=$(jq -r '
              [.[] | select(.type == "assistant") | .message.content[]? | select(.type == "text") | .text] | last // empty
            ' "$EXECUTION_FILE" 2>/dev/null)
          fi

          if [ -z "$summary" ]; then
            summary="（壁打ちサマリーの自動取得に失敗しました。施策ディレクトリの 00_proposal.md を参照してください。）"
          fi

          {
            echo "summary<<SUMMARY_EOF"
            echo "$summary"
            echo "SUMMARY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post initiative metadata
        if: inputs.mode == 'init'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          INITIATIVE_NAME: ${{ steps.extract.outputs.initiative_name }}
        run: |
          cat > /tmp/metadata_comment.md << 'COMMENT_EOF'
          <!-- initiative-metadata
          initiative_name: __INITIATIVE_NAME__
          initiative_dir: sessions/initiatives/__INITIATIVE_NAME__/
          branch: initiative/__INITIATIVE_NAME__
          -->
          📋 **施策メタデータ**
          | 項目 | 値 |
          |------|-----|
          | 施策名 | `__INITIATIVE_NAME__` |
          | ディレクトリ | `sessions/initiatives/__INITIATIVE_NAME__/` |
          | ブランチ | `initiative/__INITIATIVE_NAME__` |

          <details><summary>📖 コマンドリファレンス</summary>

          | コマンド | 用途 | 使用可能フェーズ |
          |---------|------|----------------|
          | `@ai /continue <フィードバック>` | ドラフトを更新 | wallbashing |
          | `@ai /approve` | 次フェーズへ進む | wallbashing, gate-review |
          | `@ai /reject <理由>` | ゲート判定を差し戻し | gate-review |
          | `@ai /question <質問>` | 施策について質問 | 任意 |

          </details>
          COMMENT_EOF
          sed -i "s/__INITIATIVE_NAME__/${INITIATIVE_NAME}/g" /tmp/metadata_comment.md
          gh issue comment "$ISSUE_NUMBER" --body-file /tmp/metadata_comment.md

      - name: Post wallbash summary to issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          SUMMARY: ${{ steps.extract.outputs.summary }}
          INITIATIVE_NAME: ${{ steps.extract.outputs.initiative_name }}
          REPO: ${{ github.repository }}
          MODE: ${{ inputs.mode }}
        run: |
          branch="initiative/${INITIATIVE_NAME}"

          if [ "$MODE" = "init" ]; then
            header="## 壁打ちサマリー（Round 1）"
          else
            header="## 壁打ちサマリー（継続）"
          fi

          cat > /tmp/wallbash_comment.md << COMMENT_EOF
          ${header}

          ${SUMMARY}

          ### 成果物
          - [\`00_proposal.md\`](https://github.com/${REPO}/blob/${branch}/sessions/initiatives/${INITIATIVE_NAME}/00_proposal.md)
          - [\`01_plan.md\`](https://github.com/${REPO}/blob/${branch}/sessions/initiatives/${INITIATIVE_NAME}/01_plan.md)
          - [\`02_tasks.md\`](https://github.com/${REPO}/blob/${branch}/sessions/initiatives/${INITIATIVE_NAME}/02_tasks.md)
          - [\`00a_wallbash_log.md\`](https://github.com/${REPO}/blob/${branch}/sessions/initiatives/${INITIATIVE_NAME}/00a_wallbash_log.md)

          ---
          **次のステップ**:
          - フィードバックがある場合:
          \`\`\`
          @ai /continue <フィードバック内容>
          \`\`\`
          - 内容を承認する場合:
          \`\`\`
          @ai /approve
          \`\`\`
          （フィードバック付き承認: \`@ai /approve <フィードバック内容>\`）
          COMMENT_EOF
          gh issue comment "$ISSUE_NUMBER" --body-file /tmp/wallbash_comment.md

      - name: Update labels
        if: inputs.mode == 'init'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          # initiative + initiative:wallbashing を付与
          gh issue edit "$ISSUE_NUMBER" \
            --add-label "initiative,initiative:wallbashing" 2>/dev/null || true
