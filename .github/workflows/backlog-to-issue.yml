name: Backlog to Issue

on:
  workflow_dispatch:
    inputs:
      backlog_id:
        description: 'バックログ ID（BL-001 形式）'
        required: true
        type: string

jobs:
  create-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Find backlog entry by ID
        id: find
        env:
          BACKLOG_ID: ${{ inputs.backlog_id }}
        run: |
          # BL-xxx 形式のバリデーション
          if ! echo "$BACKLOG_ID" | grep -qE '^BL-[0-9]{3}$'; then
            echo "::error::ID の形式が不正です。BL-001 のような BL-XXX 形式で指定してください: '${BACKLOG_ID}'"
            exit 1
          fi

          # backlog.csv から ID で検索
          # CSV列: ID,施策名,優先度,ステータス,対象リポジトリ,起票日,簡易説明,ファイル名,施策ディレクトリ名
          line=$(awk -F',' -v id="$BACKLOG_ID" '
            { gsub(/^[[:space:]]+|[[:space:]]+$/, "", $1) }
            $1 == id { print $0; exit }
          ' backlog/backlog.csv)

          if [ -z "$line" ]; then
            echo "::error::ID '${BACKLOG_ID}' が backlog.csv に見つかりません"
            exit 1
          fi

          name=$(echo "$line" | awk -F',' '{ gsub(/^[[:space:]]+|[[:space:]]+$/, "", $2); print $2 }')
          file=$(echo "$line" | awk -F',' '{ gsub(/^[[:space:]]+|[[:space:]]+$/, "", $8); print $8 }')
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "file=$file" >> "$GITHUB_OUTPUT"

      - name: Read backlog entry
        id: entry
        run: |
          filepath="backlog/entries/${{ steps.find.outputs.file }}"
          if [ ! -f "$filepath" ]; then
            echo "::error::バックログエントリ $filepath が見つかりません"
            exit 1
          fi
          {
            echo "content<<ENTRY_EOF"
            cat "$filepath"
            echo "ENTRY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create issue
        id: create
        env:
          GH_TOKEN: ${{ github.token }}
          BACKLOG_ID: ${{ inputs.backlog_id }}
          INITIATIVE_NAME: ${{ steps.find.outputs.name }}
          ENTRY_CONTENT: ${{ steps.entry.outputs.content }}
        run: |
          issue_url=$(gh issue create \
            --title "[${BACKLOG_ID}] ${INITIATIVE_NAME}" \
            --body "${ENTRY_CONTENT}

          ---
          > **起票元**: backlog-to-issue ワークフロー（${BACKLOG_ID}）
          > **バックログファイル**: \`backlog/entries/${{ steps.find.outputs.file }}\`")

          # Issue 番号を抽出
          issue_number=$(echo "$issue_url" | grep -oP '\d+$')
          echo "issue_number=$issue_number" >> "$GITHUB_OUTPUT"
          echo "Created Issue #${issue_number}: ${issue_url}"

      - name: Dispatch wallbash workflow
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.create.outputs.issue_number }}
        run: |
          gh workflow run initiative-wallbash.yml \
            -f issue_number="$ISSUE_NUMBER"
          echo "Dispatched initiative-wallbash.yml for Issue #${ISSUE_NUMBER}"
