name: Backlog to Issue

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      backlog_id:
        description: 'バックログ ID（BL-001 形式）'
        required: true
        type: string

jobs:
  create-issue:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Find backlog entry by ID
        id: find
        env:
          BACKLOG_ID: ${{ inputs.backlog_id }}
        run: |
          # BL-xxx 形式のバリデーション
          if ! echo "$BACKLOG_ID" | grep -qE '^BL-[0-9]{3}$'; then
            echo "::error::ID の形式が不正です。BL-001 のような BL-XXX 形式で指定してください: '${BACKLOG_ID}'"
            exit 1
          fi

          # backlog.csv から ID で検索
          # CSV列: ID,施策名,優先度,ステータス,対象リポジトリ,起票日,簡易説明,ファイル名,施策ディレクトリ名
          line=$(awk -F',' -v id="$BACKLOG_ID" '
            { gsub(/^[[:space:]]+|[[:space:]]+$/, "", $1) }
            $1 == id { print $0; exit }
          ' backlog/backlog.csv)

          if [ -z "$line" ]; then
            echo "::error::ID '${BACKLOG_ID}' が backlog.csv に見つかりません"
            exit 1
          fi

          name=$(echo "$line" | awk -F',' '{ gsub(/^[[:space:]]+|[[:space:]]+$/, "", $2); print $2 }')
          file=$(echo "$line" | awk -F',' '{ gsub(/^[[:space:]]+|[[:space:]]+$/, "", $8); print $8 }')
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "file=$file" >> "$GITHUB_OUTPUT"

      - name: Read backlog entry
        id: entry
        env:
          ENTRY_FILE: ${{ steps.find.outputs.file }}
        run: |
          filepath="backlog/entries/${ENTRY_FILE}"
          if [ ! -f "$filepath" ]; then
            echo "::error::バックログエントリ $filepath が見つかりません"
            exit 1
          fi
          {
            echo "content<<ENTRY_EOF"
            cat "$filepath"
            echo "ENTRY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create issue
        id: create
        env:
          GH_TOKEN: ${{ github.token }}
          BACKLOG_ID: ${{ inputs.backlog_id }}
          INITIATIVE_NAME: ${{ steps.find.outputs.name }}
          ENTRY_CONTENT: ${{ steps.entry.outputs.content }}
          ENTRY_FILE: ${{ steps.find.outputs.file }}
        run: |
          issue_url=$(gh issue create \
            --title "[${BACKLOG_ID}] ${INITIATIVE_NAME}" \
            --body "${ENTRY_CONTENT}

          ---
          > **起票元**: backlog-to-issue ワークフロー（${BACKLOG_ID}）
          > **バックログファイル**: \`backlog/entries/${ENTRY_FILE}\`

          ---
          💡 **使い方**: この Issue に \`@ai-task /start\` とコメントすると施策を開始できます。")

          # Issue 番号を抽出
          issue_number=$(echo "$issue_url" | grep -oP '\d+$')
          echo "issue_number=$issue_number" >> "$GITHUB_OUTPUT"
          echo "Created Issue #${issue_number}: ${issue_url}"

      - name: Dispatch wallbash workflow
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.create.outputs.issue_number }}
        run: |
          gh workflow run initiative-wallbash.yml \
            -f issue_number="$ISSUE_NUMBER"
          echo "Dispatched initiative-wallbash.yml for Issue #${ISSUE_NUMBER}"

  scheduled-create:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Select candidate from backlog
        id: select
        run: bash .github/scripts/select-backlog-candidate.sh

      - name: Exit if no candidate
        if: steps.select.outputs.has_candidate != 'true'
        run: echo "No candidate found. Exiting."

      - name: Check for duplicate issue
        id: dup_check
        if: steps.select.outputs.has_candidate == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BACKLOG_ID: ${{ steps.select.outputs.id }}
        run: |
          existing=$(gh issue list --search "[${BACKLOG_ID}] in:title" --state open --json number --jq length)
          echo "existing_count=$existing" >> "$GITHUB_OUTPUT"
          if [ "$existing" -gt 0 ]; then
            echo "Duplicate issue found for ${BACKLOG_ID}. Skipping."
          fi

      - name: Read backlog entry
        id: entry
        if: steps.select.outputs.has_candidate == 'true' && steps.dup_check.outputs.existing_count == '0'
        env:
          ENTRY_FILE: ${{ steps.select.outputs.file }}
        run: |
          filepath="backlog/entries/${ENTRY_FILE}"
          if [ ! -f "$filepath" ]; then
            echo "::error::バックログエントリ $filepath が見つかりません"
            exit 1
          fi
          {
            echo "content<<ENTRY_EOF"
            cat "$filepath"
            echo "ENTRY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create issue
        id: create
        if: steps.select.outputs.has_candidate == 'true' && steps.dup_check.outputs.existing_count == '0'
        env:
          GH_TOKEN: ${{ github.token }}
          BACKLOG_ID: ${{ steps.select.outputs.id }}
          INITIATIVE_NAME: ${{ steps.select.outputs.name }}
          ENTRY_CONTENT: ${{ steps.entry.outputs.content }}
          ENTRY_FILE: ${{ steps.select.outputs.file }}
        run: |
          issue_url=$(gh issue create \
            --title "[${BACKLOG_ID}] ${INITIATIVE_NAME}" \
            --body "${ENTRY_CONTENT}

          ---
          > **起票元**: backlog-to-issue ワークフロー（${BACKLOG_ID}、schedule トリガー）
          > **バックログファイル**: \`backlog/entries/${ENTRY_FILE}\`")

          # Issue 番号を抽出
          issue_number=$(echo "$issue_url" | grep -oP '\d+$')
          echo "issue_number=$issue_number" >> "$GITHUB_OUTPUT"
          echo "Created Issue #${issue_number}: ${issue_url}"

      - name: Dispatch wallbash workflow
        if: steps.select.outputs.has_candidate == 'true' && steps.dup_check.outputs.existing_count == '0'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.create.outputs.issue_number }}
        run: |
          gh workflow run initiative-wallbash.yml \
            -f issue_number="$ISSUE_NUMBER"
          echo "Dispatched initiative-wallbash.yml for Issue #${ISSUE_NUMBER}"

      - name: Update backlog entry status
        if: steps.select.outputs.has_candidate == 'true' && steps.dup_check.outputs.existing_count == '0'
        env:
          ENTRY_FILE: ${{ steps.select.outputs.file }}
        run: |
          filepath="backlog/entries/${ENTRY_FILE}"
          sed -i 's/| \*\*ステータス\*\* | 候補 |/| **ステータス** | 起票済み |/' "$filepath"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$filepath"
          git commit -m "chore: update backlog entry status to 起票済み (${ENTRY_FILE})"
          git push
