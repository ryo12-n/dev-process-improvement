name: Test Permissions

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code (E2E test)
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            以下の E2E テストを実行してください。各ステップを順番に実行し、最後に結果を報告してください。

            ## テスト手順

            1. **ファイル読み取り**: README.md を Read ツールで読む
            2. **ファイル編集**: /tmp/test-result.txt に現在の日時を Write ツールで書く
            3. **ブランチ作成・コミット・プッシュ**:
               - `git checkout -b test/permission-check-${{ github.run_id }}` でブランチ作成
               - /tmp/test-result.txt の内容を `test-output.txt` としてリポジトリルートに Write ツールで作成
               - `git add test-output.txt && git commit -m "test: E2E permission check (${{ github.run_id }})"` でコミット
               - `git push -u origin test/permission-check-${{ github.run_id }}` でプッシュ
            4. **PR 作成**:
               - Bash ツールで以下を実行:
                 ```
                 gh pr create --base main --head "test/permission-check-${{ github.run_id }}" --title "test: E2E permission check (${{ github.run_id }})" --body "自動テストで作成された PR です。確認後に削除してください。"
                 ```
               - 作成された PR の URL を記録する
            5. **Issue 作成・クローズ**:
               - Bash ツールで以下を実行し、Issue を作成する:
                 ```
                 gh issue create --title "test: E2E permission check (${{ github.run_id }})" --body "自動テストで作成された Issue です。自動クローズされます。" --label "e2e-test"
                 ```
               - 作成された Issue の URL を記録する
               - 作成直後に Bash ツールで以下を実行し、Issue をクローズする:
                 ```
                 gh issue close <作成したIssue番号> --comment "E2E テスト完了。自動クローズ。"
                 ```

            ## 結果報告

            全ステップ完了後、以下の形式で結果を出力してください:
            ```
            - Read: OK/NG
            - Write: OK/NG
            - Branch+Commit+Push: OK/NG
            - PR Create: OK/NG
            - PR URL: <作成されたPRのURL>
            - Issue Create+Close: OK/NG
            - Issue URL: <作成されたIssueのURL>
            ```
          claude_args: "--max-turns 15 --model claude-haiku-4-5-20251001"
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash(git *)",
                  "Bash(gh *)",
                  "Bash(cp *)",
                  "Bash(mkdir *)",
                  "Bash(rm *)",
                  "Bash(ls *)",
                  "Bash(echo *)",
                  "Read",
                  "Write",
                  "Edit",
                  "Glob",
                  "Grep"
                ]
              }
            }
