name: Initiative Close

on:
  workflow_dispatch:
    description: 'Run close phase for an initiative issue'
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: true
        type: number
      initiative_dir:
        description: 'Initiative directory path (e.g. sessions/initiatives/my-initiative/)'
        required: true
        type: string
      branch:
        description: 'Initiative branch name (e.g. initiative/my-initiative)'
        required: true
        type: string

jobs:
  close:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout initiative branch
        env:
          BRANCH: ${{ inputs.branch }}
        run: |
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          allowed_bots: "github-actions[bot]"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            `.claude/skills/gha-close/SKILL.md` を Read ツールで読み取り、その指示に従って作業してください。
            このタスクは GitHub Actions の自動化ワークフローから実行されています。

            ## 動的コンテキスト
            Issue #${{ inputs.issue_number }}
            ブランチ: ${{ inputs.branch }}
            施策ディレクトリ: ${{ inputs.initiative_dir }}
          claude_args: "--max-turns 50 --model claude-sonnet-4-6"
          show_full_output: true
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash(git *)",
                  "Bash(ls *)",
                  "Read",
                  "Write",
                  "Edit",
                  "Glob",
                  "Grep"
                ]
              }
            }

      - name: Extract close summary
        id: extract
        env:
          EXECUTION_FILE: ${{ runner.temp }}/claude-execution-output.json
        run: |
          # execution_file からサマリーを抽出
          if [ -f "$EXECUTION_FILE" ]; then
            summary=$(jq -r '
              [.[] | select(.type == "assistant") | .message.content[]? | select(.type == "text") | .text] | last // empty
            ' "$EXECUTION_FILE" 2>/dev/null)
          fi

          if [ -z "$summary" ]; then
            summary="（施策完了サマリーの自動取得に失敗しました。施策ディレクトリの成果物を直接参照してください。）"
          fi

          {
            echo "summary<<SUMMARY_EOF"
            echo "$summary"
            echo "SUMMARY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post close summary to issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          SUMMARY: ${{ steps.extract.outputs.summary }}
          INITIATIVE_DIR: ${{ inputs.initiative_dir }}
          BRANCH: ${{ inputs.branch }}
          REPO: ${{ github.repository }}
        run: |
          # 成果物リンクを構築
          artifacts="### 成果物
          - [\`施策ディレクトリ\`](https://github.com/${REPO}/tree/${BRANCH}/${INITIATIVE_DIR})
          - [\`08_gate_review.md\`](https://github.com/${REPO}/blob/${BRANCH}/${INITIATIVE_DIR}08_gate_review.md)"

          # PR リンクを取得
          pr_url=$(gh pr list --head "$BRANCH" --base main --state open --json url --jq '.[0].url' 2>/dev/null || echo "")
          pr_link=""
          if [ -n "$pr_url" ]; then
            pr_link="
          ### Pull Request
          - ${pr_url}"
          fi

          gh issue comment "$ISSUE_NUMBER" --body "## 施策完了サマリー

          ${SUMMARY}

          ${artifacts}
          ${pr_link}

          ---
          施策が完了しました。PR のマージをお願いします。"

      - name: Update PR description
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          BRANCH: ${{ inputs.branch }}
          INITIATIVE_DIR: ${{ inputs.initiative_dir }}
          REPO: ${{ github.repository }}
        run: |
          # PR 番号を取得
          pr_number=$(gh pr list --head "$BRANCH" --base main --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -z "$pr_number" ]; then
            echo "::warning::No open PR found for branch $BRANCH"
            exit 0
          fi

          # Issue タイトルを取得
          issue_title=$(gh issue view "$ISSUE_NUMBER" --json title --jq '.title')

          # PR 説明をファイル経由で更新（HEREDOC + YAML ブロックスカラーの競合を回避）
          cat > /tmp/pr_body.md << PRBODY
          ## 施策: ${issue_title}

          Issue: #${ISSUE_NUMBER}

          ## フェーズ進捗

          | フェーズ | ステータス | 成果物 |
          |---------|----------|--------|
          | 壁打ち | ✅ 完了 | [\`00_proposal.md\`](https://github.com/${REPO}/blob/${BRANCH}/${INITIATIVE_DIR}00_proposal.md) |
          | 実行 | ✅ 完了 | [\`04_work_report.md\`](https://github.com/${REPO}/blob/${BRANCH}/${INITIATIVE_DIR}04_work_report.md) |
          | ゲート判定 | ✅ 完了 | [\`08_gate_review.md\`](https://github.com/${REPO}/blob/${BRANCH}/${INITIATIVE_DIR}08_gate_review.md) |
          | クローズ | ✅ 完了 | [\`施策ディレクトリ\`](https://github.com/${REPO}/tree/${BRANCH}/${INITIATIVE_DIR}) |
          PRBODY
          gh pr edit "$pr_number" --body-file /tmp/pr_body.md

      - name: Close issue and update labels
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          # ラベルを更新して Issue をクローズ
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "initiative:gate-review" \
            --add-label "initiative:completed" 2>/dev/null || true

          gh issue close "$ISSUE_NUMBER" \
            --comment "施策のクローズ処理が完了しました。"
