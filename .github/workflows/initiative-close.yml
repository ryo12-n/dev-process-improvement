name: Initiative Close

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: true
        type: number
      initiative_dir:
        description: 'Initiative directory path (e.g. sessions/initiatives/my-initiative/)'
        required: true
        type: string
      branch:
        description: 'Initiative branch name (e.g. initiative/my-initiative)'
        required: true
        type: string

jobs:
  close:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout initiative branch
        env:
          BRANCH: ${{ inputs.branch }}
        run: |
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          allowed_bots: "github-actions[bot]"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            あなたは L1 マネージャーとして initiative のクローズフェーズを実行します。

            ## 対象
            Issue #${{ inputs.issue_number }}
            ブランチ: ${{ inputs.branch }}
            施策ディレクトリ: ${{ inputs.initiative_dir }}

            ## 実行手順

            1. 施策ディレクトリ `${{ inputs.initiative_dir }}` の成果物を確認する
            2. 知見ルーティングを実行する:
               - `04_work_report.md` の「作業中の知見」と `06_eval_report.md` の「評価中の知見」を確認
               - ルール化候補は該当ファイルへの反映を検討
               - 次施策候補は `inbox/` にファイルを作成
            3. 施策ディレクトリを `_archive/` に移動する:
               ```bash
               git mv ${{ inputs.initiative_dir }} sessions/initiatives/_archive/$(basename ${{ inputs.initiative_dir }})/
               ```
            4. 変更をコミット・プッシュする
            5. 完了サマリーを標準出力に出力する（施策の成果・知見ルーティング結果・次施策候補の概要）

            ## 制約
            - 対象リポジトリは dev-process-improvement のみ
            - コミットメッセージ規約（`.claude/rules/commit-message.md`）に従う
            - コミットメッセージは `[L1] <施策名>: クローズ（アーカイブ移動・知見ルーティング）` の形式で
          claude_args: "--max-turns 30 --model claude-sonnet-4-6"
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash(git *)",
                  "Bash(cp *)",
                  "Bash(mkdir *)",
                  "Bash(rm *)",
                  "Bash(ls *)",
                  "Read",
                  "Write",
                  "Edit",
                  "Glob",
                  "Grep"
                ]
              }
            }

      - name: Post close summary to issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          CLAUDE_RESULT: ${{ steps.claude.outputs.result }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "## 施策完了サマリー

          ${CLAUDE_RESULT}

          ---
          施策が完了しました。PR のマージをお願いします。"

      - name: Close issue and update labels
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          # ラベルを更新して Issue をクローズ
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "initiative:gate-review" \
            --add-label "initiative:completed" 2>/dev/null || true

          gh issue close "$ISSUE_NUMBER" \
            --comment "施策のクローズ処理が完了しました。"
