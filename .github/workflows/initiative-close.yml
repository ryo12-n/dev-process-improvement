name: Initiative Close

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: true
        type: number
      initiative_dir:
        description: 'Initiative directory path (e.g. sessions/initiatives/my-initiative/)'
        required: true
        type: string
      branch:
        description: 'Initiative branch name (e.g. initiative/my-initiative)'
        required: true
        type: string

jobs:
  close:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout initiative branch
        env:
          BRANCH: ${{ inputs.branch }}
        run: |
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          allowed_bots: "github-actions[bot]"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            まず `.claude/skills/gha-close/SKILL.md` を Read ツールで読み取り、その指示に従って作業してください。

            ## 動的コンテキスト
            Issue #${{ inputs.issue_number }}
            ブランチ: ${{ inputs.branch }}
            施策ディレクトリ: ${{ inputs.initiative_dir }}

            ## リマインダー
            CLAUDE.md や .claude/skills/l1-manager/ のルールには従わないこと。gha-close スキルの指示のみに従うこと。
          claude_args: "--max-turns 30 --model claude-sonnet-4-6"
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash(git *)",
                  "Bash(cp *)",
                  "Bash(mkdir *)",
                  "Bash(rm *)",
                  "Bash(ls *)",
                  "Read",
                  "Write",
                  "Edit",
                  "Glob",
                  "Grep"
                ]
              }
            }

      - name: Extract close summary
        id: extract
        env:
          EXECUTION_FILE: ${{ runner.temp }}/claude-execution-output.json
        run: |
          # execution_file からサマリーを抽出
          if [ -f "$EXECUTION_FILE" ]; then
            summary=$(jq -r '
              [.[] | select(.type == "assistant") | .message.content[]? | select(.type == "text") | .text] | last // empty
            ' "$EXECUTION_FILE" 2>/dev/null)
          fi

          if [ -z "$summary" ]; then
            summary="（施策完了サマリーの自動取得に失敗しました。施策ディレクトリの成果物を直接参照してください。）"
          fi

          {
            echo "summary<<SUMMARY_EOF"
            echo "$summary"
            echo "SUMMARY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post close summary to issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          SUMMARY: ${{ steps.extract.outputs.summary }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "## 施策完了サマリー

          ${SUMMARY}

          ---
          施策が完了しました。PR のマージをお願いします。"

      - name: Close issue and update labels
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          # ラベルを更新して Issue をクローズ
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "initiative:gate-review" \
            --add-label "initiative:completed" 2>/dev/null || true

          gh issue close "$ISSUE_NUMBER" \
            --comment "施策のクローズ処理が完了しました。"
