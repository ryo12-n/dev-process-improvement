name: Initiative Question

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: true
        type: number
      question:
        description: 'Question to ask about the initiative'
        required: true
        type: string
      initiative_dir:
        description: 'Initiative directory path (e.g. sessions/initiatives/my-initiative/)'
        required: true
        type: string
      branch:
        description: 'Initiative branch name (e.g. initiative/my-initiative)'
        required: true
        type: string

jobs:
  question:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout initiative branch
        env:
          BRANCH: ${{ inputs.branch }}
        run: |
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          allowed_bots: "github-actions[bot]"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            `.claude/skills/gha-question/SKILL.md` を Read ツールで読み取り、その指示に従って作業してください。
            このタスクは GitHub Actions の自動化ワークフローから実行されています。

            ## 動的コンテキスト
            Issue #${{ inputs.issue_number }}
            ブランチ: ${{ inputs.branch }}
            施策ディレクトリ: ${{ inputs.initiative_dir }}
            質問: ${{ inputs.question }}
          claude_args: "--max-turns 10 --model claude-sonnet-4-6"
          show_full_output: true
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash(ls *)",
                  "Read",
                  "Glob",
                  "Grep"
                ]
              }
            }

      - name: Extract answer
        id: extract
        env:
          EXECUTION_FILE: ${{ runner.temp }}/claude-execution-output.json
        run: |
          # execution_file からサマリーを抽出
          if [ -f "$EXECUTION_FILE" ]; then
            summary=$(jq -r '
              [.[] | select(.type == "assistant") | .message.content[]? | select(.type == "text") | .text] | last // empty
            ' "$EXECUTION_FILE" 2>/dev/null)
          fi

          if [ -z "$summary" ]; then
            summary="（回答の自動取得に失敗しました。ワークフローログを参照してください。）"
          fi

          {
            echo "summary<<SUMMARY_EOF"
            echo "$summary"
            echo "SUMMARY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post answer to issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          SUMMARY: ${{ steps.extract.outputs.summary }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "## 回答

          ${SUMMARY}"
