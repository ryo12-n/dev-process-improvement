name: Initiative Dispatcher

on:
  issue_comment:
    types: [created]

jobs:
  dispatch:
    if: >
      github.event.issue.pull_request == null &&
      github.event.comment.user.login != 'github-actions[bot]' &&
      contains(github.event.comment.body, '@ai-task')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      actions: write
    steps:
      - name: Add eyes reaction
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENT_ID: ${{ github.event.comment.id }}
          REPO: ${{ github.repository }}
        run: |
          gh api repos/${REPO}/issues/comments/${COMMENT_ID}/reactions \
            -f content=eyes --silent || true

      - name: Parse command
        id: parse
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          # @ai-task /command [args...] の形式をパース
          command=$(echo "$COMMENT_BODY" | grep -oP '@ai-task\s+/\K\S+' | head -1)

          if [ -z "$command" ]; then
            echo "error=unknown_command" >> "$GITHUB_OUTPUT"
            echo "error_message=コマンドが認識できません。\`@ai-task /start\`, \`/approve\`, \`/reject\`, \`/question <質問>\` のいずれかを使用してください。" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "command=$command" >> "$GITHUB_OUTPUT"

          # コマンド以降のテキストを引数として抽出
          args=$(echo "$COMMENT_BODY" | sed -n 's|.*@ai-task\s\+/'"$command"'\s*||p')
          echo "args=$args" >> "$GITHUB_OUTPUT"

      - name: Get issue labels
        id: labels
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          labels=$(gh issue view "$ISSUE_NUMBER" --json labels --jq '.labels[].name' | tr '\n' ',')
          echo "labels=$labels" >> "$GITHUB_OUTPUT"

          # フラグ設定
          if echo "$labels" | grep -q "initiative"; then
            echo "has_initiative=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_initiative=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$labels" | grep -q "initiative:wallbashing"; then
            echo "phase=wallbashing" >> "$GITHUB_OUTPUT"
          elif echo "$labels" | grep -q "initiative:gate-review"; then
            echo "phase=gate-review" >> "$GITHUB_OUTPUT"
          elif echo "$labels" | grep -q "initiative:executing"; then
            echo "phase=executing" >> "$GITHUB_OUTPUT"
          elif echo "$labels" | grep -q "initiative:completed"; then
            echo "phase=completed" >> "$GITHUB_OUTPUT"
          else
            echo "phase=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Route command
        id: route
        env:
          COMMAND: ${{ steps.parse.outputs.command }}
          PARSE_ERROR: ${{ steps.parse.outputs.error }}
          HAS_INITIATIVE: ${{ steps.labels.outputs.has_initiative }}
          PHASE: ${{ steps.labels.outputs.phase }}
          ARGS: ${{ steps.parse.outputs.args }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          # パースエラーがあればエラー出力
          if [ "$PARSE_ERROR" = "unknown_command" ]; then
            echo "action=error" >> "$GITHUB_OUTPUT"
            echo "error_message=${{ steps.parse.outputs.error_message }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case "$COMMAND" in
            start)
              # /start: initiative ラベルがないこと
              if [ "$HAS_INITIATIVE" = "true" ]; then
                echo "action=error" >> "$GITHUB_OUTPUT"
                echo "error_message=この Issue は既に initiative として開始されています（現在のフェーズ: ${PHASE}）。" >> "$GITHUB_OUTPUT"
              else
                echo "action=dispatch" >> "$GITHUB_OUTPUT"
                echo "workflow=initiative-wallbash.yml" >> "$GITHUB_OUTPUT"
                echo "dispatch_inputs={\"issue_number\":\"${ISSUE_NUMBER}\"}" >> "$GITHUB_OUTPUT"
              fi
              ;;
            approve)
              if [ "$PHASE" = "wallbashing" ]; then
                # wallbashing → execute (approve)
                echo "action=dispatch" >> "$GITHUB_OUTPUT"
                echo "workflow=initiative-execute.yml" >> "$GITHUB_OUTPUT"
                echo "dispatch_inputs={\"issue_number\":\"${ISSUE_NUMBER}\",\"command\":\"approve\",\"feedback\":\"${ARGS}\",\"phase\":\"wallbashing\"}" >> "$GITHUB_OUTPUT"
              elif [ "$PHASE" = "gate-review" ]; then
                # gate-review → close (approve)
                echo "action=dispatch" >> "$GITHUB_OUTPUT"
                echo "workflow=initiative-close.yml" >> "$GITHUB_OUTPUT"
                echo "dispatch_inputs={\"issue_number\":\"${ISSUE_NUMBER}\"}" >> "$GITHUB_OUTPUT"
              else
                echo "action=error" >> "$GITHUB_OUTPUT"
                echo "error_message=\`/approve\` は \`initiative:wallbashing\` または \`initiative:gate-review\` フェーズでのみ使用できます（現在のフェーズ: ${PHASE}）。" >> "$GITHUB_OUTPUT"
              fi
              ;;
            reject)
              if [ "$PHASE" = "gate-review" ]; then
                # gate-review → execute (reject)
                echo "action=dispatch" >> "$GITHUB_OUTPUT"
                echo "workflow=initiative-execute.yml" >> "$GITHUB_OUTPUT"
                echo "dispatch_inputs={\"issue_number\":\"${ISSUE_NUMBER}\",\"command\":\"reject\",\"feedback\":\"${ARGS}\",\"phase\":\"gate-review\"}" >> "$GITHUB_OUTPUT"
              else
                echo "action=error" >> "$GITHUB_OUTPUT"
                echo "error_message=\`/reject\` は \`initiative:gate-review\` フェーズでのみ使用できます（現在のフェーズ: ${PHASE}）。" >> "$GITHUB_OUTPUT"
              fi
              ;;
            question)
              if [ "$HAS_INITIATIVE" = "true" ]; then
                echo "action=dispatch" >> "$GITHUB_OUTPUT"
                echo "workflow=initiative-question.yml" >> "$GITHUB_OUTPUT"
                echo "dispatch_inputs={\"issue_number\":\"${ISSUE_NUMBER}\",\"question\":\"${ARGS}\"}" >> "$GITHUB_OUTPUT"
              else
                echo "action=error" >> "$GITHUB_OUTPUT"
                echo "error_message=\`/question\` は initiative として開始された Issue でのみ使用できます。" >> "$GITHUB_OUTPUT"
              fi
              ;;
            *)
              echo "action=error" >> "$GITHUB_OUTPUT"
              echo "error_message=不明なコマンド: \`/${COMMAND}\`。\`/start\`, \`/approve\`, \`/reject\`, \`/question <質問>\` のいずれかを使用してください。" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Dispatch workflow
        if: steps.route.outputs.action == 'dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW: ${{ steps.route.outputs.workflow }}
          DISPATCH_INPUTS: ${{ steps.route.outputs.dispatch_inputs }}
        run: |
          # inputs を個別の -f フラグに展開して gh workflow run を実行
          input_flags=""
          for key in $(echo "$DISPATCH_INPUTS" | jq -r 'keys[]'); do
            value=$(echo "$DISPATCH_INPUTS" | jq -r --arg k "$key" '.[$k]')
            input_flags="$input_flags -f $key=$value"
          done

          eval gh workflow run "$WORKFLOW" $input_flags

      - name: Post error comment
        if: steps.route.outputs.action == 'error'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ERROR_MESSAGE: ${{ steps.route.outputs.error_message }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "⚠️ **ディスパッチエラー**

          ${ERROR_MESSAGE}"
