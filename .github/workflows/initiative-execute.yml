name: Initiative Execute

on:
  workflow_dispatch:
    description: 'Run execute phase for an initiative issue'
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: true
        type: number
      command:
        description: 'Command to execute (approve/reject)'
        required: true
        type: string
      feedback:
        description: 'Feedback from the user'
        required: false
        type: string
      phase:
        description: 'Current phase (wallbashing/gate-review)'
        required: true
        type: string
      initiative_dir:
        description: 'Initiative directory path (e.g. sessions/initiatives/my-initiative/)'
        required: true
        type: string
      branch:
        description: 'Initiative branch name (e.g. initiative/my-initiative)'
        required: true
        type: string
      retry_count:
        description: 'Retry count for automatic re-dispatch (0-2)'
        required: false
        type: number
        default: 0

jobs:
  execute:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout initiative branch
        env:
          BRANCH: ${{ inputs.branch }}
        run: |
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"

      - name: Get issue title
        id: issue_info
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          issue_title=$(gh issue view "$ISSUE_NUMBER" --json title --jq '.title')
          echo "title=$issue_title" >> "$GITHUB_OUTPUT"

      - name: Create PR (wallbashing to executing transition)
        if: inputs.phase == 'wallbashing'
        id: create_pr
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          ISSUE_TITLE: ${{ steps.issue_info.outputs.title }}
          BRANCH: ${{ inputs.branch }}
          INITIATIVE_DIR: ${{ inputs.initiative_dir }}
          REPO: ${{ github.repository }}
        run: |
          # 既存の PR がないか確認
          existing_pr=$(gh pr list --head "$BRANCH" --base main --state open --json url --jq '.[0].url' 2>/dev/null || echo "")
          if [ -n "$existing_pr" ]; then
            echo "PR already exists: $existing_pr"
            echo "pr_url=$existing_pr" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          initiative_name=$(echo "$BRANCH" | sed 's|^initiative/||')

          # PR body をファイル経由で渡す
          cat > /tmp/pr_body.md << PRBODY
          ## 施策: ${ISSUE_TITLE}

          Issue: #${ISSUE_NUMBER}

          ## フェーズ進捗

          | フェーズ | ステータス | 成果物 |
          |---------|----------|--------|
          | 壁打ち | ✅ 完了 | [\`00_proposal.md\`](https://github.com/${REPO}/blob/${BRANCH}/${INITIATIVE_DIR}00_proposal.md) |
          | 実行 | 🔄 進行中 | |
          | ゲート判定 | ⏳ 未着手 | |
          | クローズ | ⏳ 未着手 | |
          PRBODY
          pr_url=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "initiative: ${ISSUE_TITLE}" \
            --body-file /tmp/pr_body.md 2>&1) || echo "::warning::PR creation failed. Check repository settings for Actions permissions."

          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Update labels to executing
        if: inputs.phase == 'wallbashing'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "initiative:wallbashing" \
            --add-label "initiative:executing" 2>/dev/null || true

      - name: Update labels for reject re-execution
        if: inputs.phase == 'gate-review'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "initiative:gate-review" \
            --add-label "initiative:executing" 2>/dev/null || true

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          allowed_bots: "github-actions[bot]"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            `.claude/skills/gha-execute/SKILL.md` を Read ツールで読み取り、その指示に従って作業してください。
            このタスクは GitHub Actions の自動化ワークフローから実行されています。

            ## 動的コンテキスト
            Issue #${{ inputs.issue_number }}
            ブランチ: ${{ inputs.branch }}
            施策ディレクトリ: ${{ inputs.initiative_dir }}
            フェーズ: ${{ inputs.phase }}
            コマンド: ${{ inputs.command }}
            フィードバック: ${{ inputs.feedback }}
          claude_args: "--max-turns 80 --model claude-sonnet-4-6"
          show_full_output: true
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash(git *)",
                  "Bash(ls *)",
                  "Read",
                  "Write",
                  "Edit",
                  "Glob",
                  "Grep"
                ]
              }
            }

      - name: Extract gate review summary
        id: extract
        env:
          EXECUTION_FILE: ${{ runner.temp }}/claude-execution-output.json
        run: |
          # execution_file からサマリーを抽出
          if [ -f "$EXECUTION_FILE" ]; then
            summary=$(jq -r '
              [.[] | select(.type == "assistant") | .message.content[]? | select(.type == "text") | .text] | last // empty
            ' "$EXECUTION_FILE" 2>/dev/null)
          fi

          if [ -z "$summary" ]; then
            summary="（ゲート判定サマリーの自動取得に失敗しました。施策ディレクトリの 08_gate_review.md を参照してください。）"
          fi

          {
            echo "summary<<SUMMARY_EOF"
            echo "$summary"
            echo "SUMMARY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Extract gate verdict
        id: verdict
        env:
          SUMMARY: ${{ steps.extract.outputs.summary }}
        run: |
          verdict=$(echo "$SUMMARY" | grep -oP 'GATE_VERDICT:\s*\K.+' | head -1 | xargs)
          echo "verdict=$verdict" >> "$GITHUB_OUTPUT"
          if [ -n "$verdict" ]; then
            echo "Detected verdict: $verdict"
          else
            echo "::notice::GATE_VERDICT not found in summary. Auto-dispatch will be skipped."
          fi

      - name: Post gate review summary to issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          SUMMARY: ${{ steps.extract.outputs.summary }}
          INITIATIVE_DIR: ${{ inputs.initiative_dir }}
          BRANCH: ${{ inputs.branch }}
          REPO: ${{ github.repository }}
        run: |
          # 成果物リンクを構築
          artifacts="### 成果物
          - [\`04_work_report.md\`](https://github.com/${REPO}/blob/${BRANCH}/${INITIATIVE_DIR}04_work_report.md)
          - [\`06_eval_report.md\`](https://github.com/${REPO}/blob/${BRANCH}/${INITIATIVE_DIR}06_eval_report.md)
          - [\`08_gate_review.md\`](https://github.com/${REPO}/blob/${BRANCH}/${INITIATIVE_DIR}08_gate_review.md)"

          # PR リンクを取得
          pr_url=$(gh pr list --head "$BRANCH" --base main --state open --json url --jq '.[0].url' 2>/dev/null || echo "")
          pr_link=""
          if [ -n "$pr_url" ]; then
            pr_link="
          ### Pull Request
          - ${pr_url}"
          fi

          gh issue comment "$ISSUE_NUMBER" --body "## ゲート判定サマリー

          ${SUMMARY}

          ${artifacts}
          ${pr_link}

          ---
          **次のステップ**: ゲート判定結果を確認してください。
          - 承認する場合: \`@ai-task /approve\` コメントでクローズフェーズに進みます
          - 差し戻す場合: \`@ai-task /reject <フィードバック内容>\` コメントで修正・再実行します"

      - name: Update PR description
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          BRANCH: ${{ inputs.branch }}
          INITIATIVE_DIR: ${{ inputs.initiative_dir }}
          REPO: ${{ github.repository }}
        run: |
          # PR 番号を取得
          pr_number=$(gh pr list --head "$BRANCH" --base main --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -z "$pr_number" ]; then
            echo "::warning::No open PR found for branch $BRANCH"
            exit 0
          fi

          # Issue タイトルを取得
          issue_title=$(gh issue view "$ISSUE_NUMBER" --json title --jq '.title')

          # PR 説明をファイル経由で更新（HEREDOC + YAML ブロックスカラーの競合を回避）
          cat > /tmp/pr_body.md << PRBODY
          ## 施策: ${issue_title}

          Issue: #${ISSUE_NUMBER}

          ## フェーズ進捗

          | フェーズ | ステータス | 成果物 |
          |---------|----------|--------|
          | 壁打ち | ✅ 完了 | [\`00_proposal.md\`](https://github.com/${REPO}/blob/${BRANCH}/${INITIATIVE_DIR}00_proposal.md) |
          | 実行 | ✅ 完了 | [\`04_work_report.md\`](https://github.com/${REPO}/blob/${BRANCH}/${INITIATIVE_DIR}04_work_report.md) |
          | ゲート判定 | ✅ 完了 | [\`08_gate_review.md\`](https://github.com/${REPO}/blob/${BRANCH}/${INITIATIVE_DIR}08_gate_review.md) |
          | クローズ | ⏳ 未着手 | |
          PRBODY
          gh pr edit "$pr_number" --body-file /tmp/pr_body.md

      - name: Update labels to gate-review
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "initiative:executing" \
            --add-label "initiative:gate-review" 2>/dev/null || true

      - name: Auto-dispatch based on gate verdict
        env:
          GH_TOKEN: ${{ github.token }}
          VERDICT: ${{ steps.verdict.outputs.verdict }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          INITIATIVE_DIR: ${{ inputs.initiative_dir }}
          BRANCH: ${{ inputs.branch }}
          RETRY_COUNT: ${{ inputs.retry_count }}
        run: |
          if [ -z "$VERDICT" ]; then
            echo "::notice::No GATE_VERDICT detected. Stopping at gate-review label (conventional behavior)."
            exit 0
          fi

          if [ "$VERDICT" = "通過" ] || [ "$VERDICT" = "条件付き通過" ]; then
            echo "Verdict: $VERDICT — Dispatching initiative-close.yml"
            gh workflow run initiative-close.yml \
              -f issue_number="$ISSUE_NUMBER" \
              -f initiative_dir="$INITIATIVE_DIR" \
              -f branch="$BRANCH"
          elif [ "$VERDICT" = "差し戻し" ]; then
            if [ "$RETRY_COUNT" -lt 2 ]; then
              next_retry=$((RETRY_COUNT + 1))
              echo "Verdict: 差し戻し — Self-dispatching initiative-execute.yml (retry $next_retry/2)"
              gh workflow run initiative-execute.yml \
                -f issue_number="$ISSUE_NUMBER" \
                -f command="reject" \
                -f phase="gate-review" \
                -f initiative_dir="$INITIATIVE_DIR" \
                -f branch="$BRANCH" \
                -f retry_count="$next_retry"
            else
              echo "Verdict: 差し戻し — Retry limit reached ($RETRY_COUNT/2). Posting comment."
              gh issue comment "$ISSUE_NUMBER" \
                --body "自動リトライ上限（2回）に達しました。手動で \`/approve\` または \`/reject\` を使用してください。"
            fi
          else
            echo "::notice::Unknown verdict: $VERDICT. Stopping at gate-review label."
          fi
