name: Initiative Execute

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: true
        type: number
      command:
        description: 'Command to execute (approve/reject)'
        required: true
        type: string
      feedback:
        description: 'Feedback from the user'
        required: false
        type: string
      phase:
        description: 'Current phase (wallbashing/gate-review)'
        required: true
        type: string
      initiative_dir:
        description: 'Initiative directory path (e.g. sessions/initiatives/my-initiative/)'
        required: true
        type: string
      branch:
        description: 'Initiative branch name (e.g. initiative/my-initiative)'
        required: true
        type: string

jobs:
  execute:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout initiative branch
        env:
          BRANCH: ${{ inputs.branch }}
        run: |
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"

      - name: Update labels to executing
        if: inputs.phase == 'wallbashing'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "initiative:wallbashing" \
            --add-label "initiative:executing" 2>/dev/null || true

      - name: Update labels for reject re-execution
        if: inputs.phase == 'gate-review'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "initiative:gate-review" \
            --add-label "initiative:executing" 2>/dev/null || true

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            あなたは L1 マネージャーとして initiative の実行フェーズを非対話モードで実行します。

            ## 対象
            Issue #${{ inputs.issue_number }}
            ブランチ: ${{ inputs.branch }}
            施策ディレクトリ: ${{ inputs.initiative_dir }}
            フェーズ: ${{ inputs.phase }}
            コマンド: ${{ inputs.command }}
            フィードバック: ${{ inputs.feedback }}

            ## 実行手順

            ### /approve の場合（壁打ち → 実行）
            1. 施策ディレクトリ `${{ inputs.initiative_dir }}` の `00_proposal.md` を読み取る
            2. フィードバックがある場合は `00_proposal.md` に反映する
            3. `01_plan.md` を作成（実施計画）
            4. `02_tasks.md` を作成（タスクリスト）
            5. L2-worker として `02_tasks.md` のタスクを実行し、`03_work_log.md` と `04_work_report.md` を作成
            6. L2-evaluator として作業成果を評価し、`05_eval_plan.md` と `06_eval_report.md` を作成
            7. `07_issues.md` に発見した課題を記録
            8. `08_gate_review.md` でゲート判定を行う
            9. ゲート判定サマリーを標準出力に出力する（Action が Issue コメントとして投稿する）
            10. コミット・プッシュする

            ### /reject の場合（ゲート判定差し戻し → 修正・再実行）
            1. 施策ディレクトリ `${{ inputs.initiative_dir }}` を読み取る
            2. フィードバック内容を確認し、指摘事項に対応する
            3. 修正が必要なタスクを再実行する
            4. `04_work_report.md` と `06_eval_report.md` を更新する
            5. `08_gate_review.md` を再作成する
            6. ゲート判定サマリーを標準出力に出力する
            7. コミット・プッシュする

            ## 制約
            - 対象リポジトリは dev-process-improvement のみ
            - コミットメッセージ規約（`.claude/rules/commit-message.md`）に従う
            - コミットメッセージは `[L1] <施策名>: 実行フェーズ` の形式で
          claude_args: "--max-turns 80 --model claude-sonnet-4-6"
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash(git *)",
                  "Bash(cp *)",
                  "Bash(mkdir *)",
                  "Bash(rm *)",
                  "Bash(ls *)",
                  "Read",
                  "Write",
                  "Edit",
                  "Glob",
                  "Grep"
                ]
              }
            }

      - name: Post gate review summary to issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          CLAUDE_RESULT: ${{ steps.claude.outputs.result }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "## ゲート判定サマリー

          ${CLAUDE_RESULT}

          ---
          **次のステップ**: ゲート判定結果を確認してください。
          - 承認する場合: \`@ai-task /approve\` コメントでクローズフェーズに進みます
          - 差し戻す場合: \`@ai-task /reject <フィードバック内容>\` コメントで修正・再実行します"

      - name: Update labels to gate-review
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "initiative:executing" \
            --add-label "initiative:gate-review" 2>/dev/null || true
